<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } 
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } 
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyADameTAYU9ZqPfIjI0C1HPgBpQZToVbkw",
    authDomain: "sundar-school-billing.firebaseapp.com",
    projectId: "sundar-school-billing",
    storageBucket: "sundar-school-billing.firebasestorage.app",
    messagingSenderId: "487882789199",
    appId: "1:487882789199:web:d271521aadeb1dfdfd353a"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // LOGIN
  window.login = function() {
    const email = document.getElementById("email").value;
    const pass = document.getElementById("password").value;

    signInWithEmailAndPassword(auth, email, pass)
      .catch(error => {
        document.getElementById("msg").innerText = error.message;
      });
  }

  // LOGOUT
  window.logout = function() {
    signOut(auth);
  }

  // AUTO LOGIN CHECK
  onAuthStateChanged(auth, (user) => {
    if (user) {
      document.getElementById("loginSection").style.display = "none";
      document.getElementById("dashboard").style.display = "block";
      loadStudents();
    } else {
      document.getElementById("loginSection").style.display = "block";
      document.getElementById("dashboard").style.display = "none";
    }
  });

  // ADD STUDENT
  window.addStudent = async function() {
    const name = document.getElementById("studentName").value;
    const studentClass = document.getElementById("studentClass").value;
    const fee = document.getElementById("studentFee").value;

    try {
      await addDoc(collection(db, "students"), {
        name: name,
        class: studentClass,
        fee: fee,
        createdAt: new Date()
      });

      document.getElementById("status").innerText = "Student Added Successfully ✅";
      loadStudents();

    } catch (error) {
      document.getElementById("status").innerText = error.message;
    }
  }

  // LOAD STUDENTS
  async function loadStudents() {
    const querySnapshot = await getDocs(collection(db, "students"));
    const list = document.getElementById("studentList");
    list.innerHTML = "";

    querySnapshot.forEach((docItem) => {
      const data = docItem.data();
      const li = document.createElement("li");

      li.innerHTML = `
        ${data.name} | Class: ${data.class} | Fee: ${data.fee}
        <button onclick="deleteStudent('${docItem.id}')">Delete</button>
      `;

      list.appendChild(li);
    });
  }

  // DELETE STUDENT
  window.deleteStudent = async function(id) {
    await deleteDoc(doc(db, "students", id));
    loadStudents();
  }

</script>
