<!DOCTYPE html>
<html>
<head>
  <title>Sundarj School Billing</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    .container { max-width: 500px; margin: auto; }
    input { width: 100%; padding: 10px; margin: 5px 0; }
    button { padding: 10px; width: 100%; background: green; color: white; border: none; margin-top:5px; }
    #dashboard { display:none; }
  </style>
</head>
<body>

<div class="container">

  <!-- LOGIN SECTION -->
  <div id="loginSection">
    <h2>Admin Login</h2>
    <input type="email" id="email" placeholder="Enter email">
    <input type="password" id="password" placeholder="Enter password">
    <button onclick="login()">Login</button>
    <p id="msg"></p>
  </div>

  <!-- DASHBOARD SECTION -->
   <div id="dashboard">
  <h2>📊 Dashboard</h2>
  <p>Total Students: <span id="totalStudents">0</span></p>
  <p>Total Expected: ₹<span id="totalExpected">0</span></p>
  <p>This Month Collected: ₹<span id="totalCollected">0</span></p>
  <p>Total Due: ₹<span id="totalDue">0</span></p>

 <h3>Add Student</h3>
<input type="text" id="studentName" placeholder="Student Name">
<input type="text" id="studentClass" placeholder="Class">
<input type="number" id="studentFee" placeholder="Monthly Fee">

<button onclick="addStudent()">Add Student</button>

<p id="status"></p>
<h3>Student List</h3>
<ul id="studentList"></ul>
    
<button onclick="logout()">Logout</button>

</div>

<hr>
    

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import { 
  getAuth, 
  signInWithEmailAndPassword, 
  signOut, 
  onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import { 
  getFirestore, 
  collection, 
  addDoc, 
  getDocs, 
  deleteDoc, 
  doc, 
  updateDoc, 
  getDoc 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";


const firebaseConfig = {
  apiKey: "AIzaSyADameTAYU9ZqPfIjI0C1HPgBpQZToVbkw",
  authDomain: "sundar-school-billing.firebaseapp.com",
  projectId: "sundar-school-billing",
  storageBucket: "sundar-school-billing.firebasestorage.app",
  messagingSenderId: "487882789199",
  appId: "1:487882789199:web:d271521aadeb1dfdfd353a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);


// LOGIN
window.login = async function() {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch (error) {
    document.getElementById("msg").innerText = error.message;
  }
}


// LOGOUT
window.logout = function() {
  signOut(auth);
}


// AUTO LOGIN CHECK
onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById("loginSection").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    loadStudents();
  } else {
    document.getElementById("loginSection").style.display = "block";
    document.getElementById("dashboard").style.display = "none";
  }
});


// ADD STUDENT
window.addStudent = async function() {

  const name = document.getElementById("studentName").value;
  const studentClass = document.getElementById("studentClass").value;
  const fee = document.getElementById("studentFee").value;

  await addDoc(collection(db, "students"), {
    name: name,
    class: studentClass,
    fee: Number(fee),
    payments: [],
    createdAt: new Date()
  });

  document.getElementById("status").innerText = "Student Added Successfully ✅";
  loadStudents();
}


// LOAD STUDENTS
async function loadStudents() {

  const querySnapshot = await getDocs(collection(db, "students"));
  const list = document.getElementById("studentList");
  list.innerHTML = "";

  const currentMonth = new Date().toLocaleString('default', { month: 'long' });

  let totalStudents = 0;
  let totalExpected = 0;
  let totalCollected = 0;

  querySnapshot.forEach((docItem) => {

    const data = docItem.data();
    const li = document.createElement("li");

    totalStudents++;
    totalExpected += Number(data.fee);

    const payments = data.payments || [];
    const isPaid = payments.some(p => p.month === currentMonth);

    if (isPaid) {
      totalCollected += Number(data.fee);
    }

    li.innerHTML = `
      <b>${data.name}</b> | Class: ${data.class} | Fee: ${data.fee}
      <br>
      Status: ${isPaid ? "✅ Paid" : "❌ Unpaid"}
      <br>
      <button onclick="markPaid('${docItem.id}')">Mark Paid</button>
      <button onclick="deleteStudent('${docItem.id}')">Delete</button>
      <br><b>Payment History:</b><br>
    `;

    payments.forEach(p => {
      li.innerHTML += `${p.month} (${p.date}) <br>`;
    });

    li.innerHTML += "<hr>";

    list.appendChild(li);
  });

  document.getElementById("totalStudents").innerText = totalStudents;
  document.getElementById("totalExpected").innerText = totalExpected;
  document.getElementById("totalCollected").innerText = totalCollected;
  document.getElementById("totalDue").innerText = totalExpected - totalCollected;
}


// DELETE
window.deleteStudent = async function(id) {
  await deleteDoc(doc(db, "students", id));
  loadStudents();
}


// MARK PAID
window.markPaid = async function(id) {

  const studentRef = doc(db, "students", id);
  const studentSnap = await getDoc(studentRef);
  const data = studentSnap.data();

  const currentMonth = new Date().toLocaleString('default', { month: 'long' });
  const today = new Date().toISOString().split("T")[0];

  let payments = data.payments || [];

  const alreadyPaid = payments.some(p => p.month === currentMonth);

  if (alreadyPaid) {
    alert("Already paid for this month!");
    return;
  }

  payments.push({
    month: currentMonth,
    date: today
  });

  await updateDoc(studentRef, { payments: payments });

  loadStudents();
}

</script>
